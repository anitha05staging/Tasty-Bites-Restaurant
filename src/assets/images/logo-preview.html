<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Preview</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            background: #333;
            color: white;
        }

        .box {
            padding: 20px;
            border: 1px solid #555;
        }

        .white-bg {
            background: white;
            color: black;
        }

        img {
            height: 100px;
            display: block;
            margin-bottom: 10px;
        }

        .filter {
            filter: brightness(0) invert(1);
        }
    </style>
</head>

<body>
    <div class="box">
        <h3>Original (on Dark)</h3>
        <img src="logo.png" alt="Original Logo">
    </div>
    <div class="box white-bg">
        <h3>Original (on White)</h3>
        <img src="logo.png" alt="Original Logo">
    </div>
    <div class="box">
        <h3>With Filter (brightness-0 invert)</h3>
        <img src="logo.png" class="filter" alt="Filtered Logo">
    </div>
</body>

</html>
